<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reflex Challenge</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="icon" href="../images/favicon.ico">
    </head>


    <body class="playground_body">

       <header class="all_header">
            <div class="main_header">
                <div class="logo_block">
                    <h1>APAM LLC</h1>
                    <img src="../images/logo.png" alt="APAM logo">
                </div>
                <nav class="nav_block">
                    <a href="../index.html">Home</a>
                    <a href="../projects.html">Projects</a>
                    <a href="../sels_school.html">Sels</a>
                    <a href="../playground.html">Playground</a>
                    <a href="../jobs.html">Jobs</a>
                    <a href="../contact.html">Contact Us</a>
                    <a href="../about.html">About Us</a>
                </nav>
            </div>  
        </header>
        <main class="reflex_main">
            <section class="reflex_intro">
                <h2>Reflex Challenge</h2>
                <p>When the object turns color at the edge, press the correct arrow key
                    (↑ ↓ ← →) based on its position.
                </p>
            </section>
            <section class="reflex_game">
                <p class="reflex_status">Press start to begin.</p>
                <button id="reflex_start_btn">Start Game</button>
                <div class="reflex_area" id="reflex_area">
                    <div class="reflex_ball" id="reflex_ball"></div>
                </div>
                <div class="reflex_controls">
                    <button data-dir="up">↑</button>
                    <div>
                        <button data-dir="left">←</button>
                        <button data-dir="down">↓</button>
                        <button data-dir="right">→</button>
                    </div>
                </div>
                <p class="reflex_result" id="reflex_result">Score: 0</p>
            </section>        
        </main>
        <footer class="main_footer">
            <div class="footer_top">
                <div class="footer_logo">
                    <img src="../images/logo.png" alt="APAM logo">
                    <span>APAM LLC</span>
                </div>
                <div class="footer_links">
                    <a href="../legal/privacy.html">Privacy Policy</a>
                    <a href="../legal/terms.html">Terms of Use</a>
                </div>
            </div>    
            <div class="footer_bottom">
                <p>2026 APAM LLC. All rights reserved.</p>
            </div>
        </footer>
        <script src="../js/games.js"></script>
    </body>
    
</html>
