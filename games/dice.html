<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dice Game</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="icon" href="../images/favicon.ico">
    </head>


    <body class="playground_body">

       <header class="all_header">
            <div class="main_header">
                <div class="logo_block">
                    <h1>APAM LLC</h1>
                    <img src="../images/logo.png" alt="APAM logo">
                </div>
                <nav class="nav_block">
                    <a href="../index.html">Home</a>
                    <a href="../projects.html">Projects</a>
                    <a href="../sels_school.html">Sels</a>

                    <a href="../contact.html">Contact Us</a>
                    <a href="../about.html">About Us</a>
                </nav>
            </div>  
        </header>
        <main class="dice_main">
            <section class="dice_intro">
                <h2>Lucky Dice 🎲</h2>
                <p>Press start and test your luck. Will you hit 6 or get unlucky?</p>
            </section>
            <section class="dice_game">
                <p class="dice_status">Press start to roll the dice.</p>
                <button id="dice_start_btn">Roll Dice</button>
                <div class="dice_box">
                    <div class="dice" id="dice">🎲</div>
                </div>
                <div class="dice_result" id="dice_result">Result: -</div>
                <div class="dice_phrase" id="dice_phrase"></div>
            </section>
        </main>
        <footer class="main_footer">
            <div class="footer_top">
                <div class="footer_logo">
                    <img src="../images/logo.png" alt="APAM logo">

                </div>
                <div class="footer_links">
                    <a href="../legal/privacy.html">Privacy Policy</a>
